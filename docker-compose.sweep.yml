services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: wsa-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${WSA_PARTITIONS:-1}

  mongo:
    image: mongo:7
    container_name: wsa-mongo
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    container_name: wsa-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: wsa-postgres
    environment:
      POSTGRES_DB: wsa
      POSTGRES_USER: wsa
      POSTGRES_PASSWORD: wsa
    ports:
      - "5432:5432"

  gateway:
    image: wsa-gateway
    container_name: wsa-gateway
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"

  enrichment:
    image: wsa-enrichment
    depends_on: [kafka, redis]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WSA_STORAGE: redis
      SPRING_DATA_REDIS_HOST: redis

  event-store:
    image: wsa-event-store
    depends_on: [kafka, mongo, postgres]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WSA_STORAGE: ${WSA_STORAGE:-mongo}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/wsa
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wsa
      SPRING_DATASOURCE_USERNAME: wsa
      SPRING_DATASOURCE_PASSWORD: wsa

  analytics:
    image: wsa-analytics
    container_name: wsa-analytics
    depends_on: [mongo, postgres]
    environment:
      WSA_STORAGE: ${WSA_STORAGE:-mongo}
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/wsa
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wsa
      SPRING_DATASOURCE_USERNAME: wsa
      SPRING_DATASOURCE_PASSWORD: wsa
    ports:
      - "8084:8084"
