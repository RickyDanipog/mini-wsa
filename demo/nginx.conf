server {
    listen 80;
    server_name _;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/gateway/v1/events/ingest {
        proxy_pass http://gateway:8081/v1/events/ingest;
        proxy_set_header Host $host;
    }
    location /api/gateway/ {
        proxy_pass http://gateway:8081/;
        proxy_set_header Host $host;
    }
    location /api/analytics/ {
        proxy_pass http://analytics:8084/;
        proxy_set_header Host $host;
    }
    location /api/enrichment/ {
        proxy_pass http://enrichment:8082/;
        proxy_set_header Host $host;
    }

    location = /nginx.conf { return 404; }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri /index.html;
    }
}
