# Mini WSA — v2 pipeline. Kafka is the transport. enrichment uses Redis for the
# offender window (wsa.storage=redis); event-store + analytics share PostgreSQL
# (wsa.storage=postgres) — chosen after the storage benchmark (docs/storage-benchmark.md).
# Bring up: docker compose up --build
services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: wsa-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  redis:
    image: redis:7
    container_name: wsa-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: wsa-postgres
    environment:
      POSTGRES_DB: wsa
      POSTGRES_USER: wsa
      POSTGRES_PASSWORD: wsa
    ports:
      - "5432:5432"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: gateway
    container_name: wsa-gateway
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8081"

  enrichment:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: enrichment
    container_name: wsa-enrichment
    depends_on: [kafka, redis, postgres]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WSA_STORAGE: redis
      SPRING_DATA_REDIS_HOST: redis
      WSA_RULES: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wsa
      SPRING_DATASOURCE_USERNAME: wsa
      SPRING_DATASOURCE_PASSWORD: wsa
    ports:
      - "8082:8082"

  event-store:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: event-store
    container_name: wsa-event-store
    depends_on: [kafka, postgres]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WSA_STORAGE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wsa
      SPRING_DATASOURCE_USERNAME: wsa
      SPRING_DATASOURCE_PASSWORD: wsa
    ports:
      - "8083:8083"

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        MODULE: analytics
    container_name: wsa-analytics
    depends_on: [postgres]
    environment:
      WSA_STORAGE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wsa
      SPRING_DATASOURCE_USERNAME: wsa
      SPRING_DATASOURCE_PASSWORD: wsa
    ports:
      - "8084:8084"
