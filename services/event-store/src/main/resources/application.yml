server:
  port: 8083
spring:
  application:
    name: event-store
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
wsa:
  consumer-group: event-store
  topics:
    enriched: events.enriched
management:
  endpoints:
    web:
      exposure:
        include: health,info
